apiVersion: v1
kind: Namespace
metadata:
  name: zta-lab-debug
  labels: { istio-injection: "disabled" }   # deliberately NO sidecar
---
apiVersion: v1
kind: Pod
metadata: { name: debug, namespace: zta-lab-debug }
spec:
  containers:
  - name: tools
    image: nicolaka/netshoot:v0.13
    command: ["sleep", "36000"]
    securityContext:
      capabilities: { add: ["NET_RAW","NET_ADMIN"] }   # tcpdump needs these
