apiVersion: apps/v1
kind: Deployment
metadata: { name: svid-watcher, namespace: bookstore-api, labels: { zta.resource: "true", zta.data-class: "confidential", zta.owner: "retail-api", zta.tier-role: "api" } }
spec:
  replicas: 1
  selector: { matchLabels: { app: svid-watcher } }
  template:
    metadata:
      labels: { app: svid-watcher, zta.resource: "true", zta.data-class: "confidential", zta.owner: "retail-api", zta.tier-role: "api" }
    spec:
      serviceAccountName: default
      containers:
      - name: watcher
        image: ghcr.io/spiffe/spiffe-helper:0.9.0
        args: ["-config", "/config/helper.conf"]
        volumeMounts:
        - { name: config,   mountPath: /config }
        - { name: svid-out, mountPath: /svid }
        - { name: spire-agent-socket, mountPath: /run/spire/sockets }
      - name: observer
        # istio/proxyv2 is already cached on every node (sidecar image) and
        # ships with /bin/sh + openssl 3.0.2, so we don't need alpine:3.20
        # plus a runtime `apk add openssl` that depends on dl-cdn.alpinelinux.org
        # being reachable from the pod network.
        image: docker.io/istio/proxyv2:1.22.3
        # -ext subjectAltName is added so the observer log emits the
        # `URI:spiffe://...` line that 05-verify.sh greps for to confirm SPIRE
        # (not some bystander CA) issued the SVID. Without it, the cert is
        # still valid but the URI SAN never appears in stdout.
        command: ["/bin/sh","-c","while true; do if [ -f /svid/svid.pem ]; then openssl x509 -in /svid/svid.pem -noout -serial -enddate -subject -ext subjectAltName; fi; sleep 15; done"]
        volumeMounts:
        - { name: svid-out, mountPath: /svid, readOnly: true }
      volumes:
      - name: config
        configMap:
          name: svid-helper
      - { name: svid-out, emptyDir: {} }
      - name: spire-agent-socket
        hostPath: { path: /run/spire/sockets, type: DirectoryOrCreate }
---
apiVersion: v1
kind: ConfigMap
metadata: { name: svid-helper, namespace: bookstore-api }
data:
  helper.conf: |
    agent_address = "/run/spire/sockets/agent.sock"
    cmd = ""
    cmd_args = ""
    cert_dir = "/svid"
    svid_file_name = "svid.pem"
    svid_key_file_name = "svid.key"
    svid_bundle_file_name = "bundle.pem"
    renew_signal = "SIGUSR1"
